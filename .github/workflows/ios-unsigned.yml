name: Build iOS App (Unsigned)

on:
  push:
    branches: [ "main", "IOSTest" ]
  workflow_dispatch:

jobs:
  build-unsigned-ios:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      # REQUIRED because you have a 'rust' folder.
      # Ensures the runner can compile Rust code for iOS architectures.
      - name: Setup Rust targets
        run: |
          rustup target add aarch64-apple-ios x86_64-apple-ios

      # 1. Build the Kotlin Framework
      # Targeting ':shared' based on your folder structure. 
      # If this fails with "project not found", try changing it to ':app:iosArm64Binaries'
      - name: Build Kotlin Framework
        run: ./gradlew :shared:iosArm64Binaries

      # 2. Generate Xcode Project
      # Creates iosApp.xcodeproj from your project.yml
      - name: Generate Xcode Project
        run: |
          brew install xcodegen
          cd iosApp
          xcodegen generate

      # 3. Build Unsigned .app
      # Forces Xcode to build without checking for a developer account
      - name: Build Unsigned .app
        run: |
          cd iosApp
          xcodebuild \
            -project KawaiiRawEditor.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      # 4. Package into IPA
      # Manually zips the .app bundle into an installable .ipa format
      - name: Package into IPA
        run: |
          cd iosApp/build/Release-iphoneos
          mkdir Payload
          cp -r iosApp.app Payload/
          zip -r iosApp-unsigned.ipa Payload

      # 5. Upload Artifact
      # Makes the file available for download in the GitHub Actions tab
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-unsigned
          path: iosApp/build/Release-iphoneos/iosApp-unsigned.ipa