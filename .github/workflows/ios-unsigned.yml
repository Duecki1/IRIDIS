name: Build iOS App (Unsigned)

on:
  push:
    branches: [ "main", "IOSTest" ]
  workflow_dispatch:

jobs:
  build-unsigned-ios:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Rust targets
        run: |
          rustup target add aarch64-apple-ios x86_64-apple-ios

      # 1. Build the Kotlin Framework
      # Generates 'KawaiiShared.framework'
      - name: Build Kotlin Framework
        run: ./gradlew :shared:iosArm64Binaries

      # 2. Generate Xcode Project
      # Creates KawaiiRawEditor.xcodeproj
      - name: Generate Xcode Project
        run: |
          brew install xcodegen
          cd iosApp
          xcodegen generate

      # 3. Build Unsigned .app
      # FIX: Changed -scheme to KawaiiRawEditor (was iosApp)
      - name: Build Unsigned .app
        run: |
          cd iosApp
          xcodebuild \
            -project KawaiiRawEditor.xcodeproj \
            -scheme KawaiiRawEditor \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      # 4. Package into IPA
      # FIX: The app bundle is named KawaiiRawEditor.app
      - name: Package into IPA
        run: |
          cd iosApp/build/Release-iphoneos
          mkdir Payload
          cp -r KawaiiRawEditor.app Payload/
          zip -r iosApp-unsigned.ipa Payload

      # 5. Upload Artifact
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-unsigned
          path: iosApp/build/Release-iphoneos/iosApp-unsigned.ipa