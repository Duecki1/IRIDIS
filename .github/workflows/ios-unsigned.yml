name: Build iOS App (Unsigned)

on:
  push:
    branches: [ "main", "IOSTest" ]
  workflow_dispatch:

jobs:
  build-unsigned-ios:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      # Cache Gradle to speed up future builds
      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Setup Rust targets
        run: |
          rustup target add aarch64-apple-ios x86_64-apple-ios

      # 1. Build the Kotlin Framework (Debug)
      - name: Build Kotlin Framework (Debug)
        run: ./gradlew :shared:linkDebugFrameworkIosArm64 --parallel

      # 2. Generate Xcode Project
      - name: Generate Xcode Project
        run: |
          brew install xcodegen
          cd iosApp
          xcodegen generate

      # 3. Build Unsigned .app (Debug)
      # FIX: Added SYMROOT=$(PWD)/build to force output to the correct folder
      - name: Build Unsigned .app
        run: |
          cd iosApp
          xcodebuild \
            -project KawaiiRawEditor.xcodeproj \
            -scheme KawaiiRawEditor \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            SYMROOT=$(PWD)/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      # 4. Package into IPA
      # Now this folder is guaranteed to exist
      - name: Package into IPA
        run: |
          cd iosApp/build/Debug-iphoneos
          mkdir Payload
          cp -r KawaiiRawEditor.app Payload/
          zip -r iosApp-unsigned-debug.ipa Payload

      # 5. Upload Artifact
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-unsigned-debug
          path: iosApp/build/Debug-iphoneos/iosApp-unsigned-debug.ipa