name: Build iOS (Unsigned/AdHoc)

on:
  push:
    branches: ["main", "IOSTest"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    env:
      SCHEME: KawaiiRawEditor
      CONFIG: Debug
      ARCHIVE_PATH: build/ios/KawaiiRawEditor.xcarchive
      OUT_DIR: build_artifacts

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java (for Gradle/KMP)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Java (Gradle/KMP)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build KMP iOS framework
        run: ./gradlew :shared:linkDebugFrameworkIosArm64

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          set -euo pipefail
          cd iosApp
          xcodegen generate

      - name: Commit generated Xcode project
        if: always()
        env:
          TARGET_BRANCH: IOSTest
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # add generated project
          git add -A iosApp/KawaiiRawEditor.xcodeproj || true
          git add -A iosApp/Project.yml || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add generated Xcode project from xcodegen"
            git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" HEAD:${TARGET_BRANCH}
          fi

      - name: Archive iOS app (unsigned)
        run: |
          set -euo pipefail
          xcodebuild \
            -project iosApp/KawaiiRawEditor.xcodeproj \
            -scheme "${SCHEME}" \
            -configuration "${CONFIG}" \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath "${ARCHIVE_PATH}" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Package IPA (unsigned)
        run: |
          set -euo pipefail
          rm -rf "${OUT_DIR}"
          mkdir -p "${OUT_DIR}/Payload"

          APP_PATH="${ARCHIVE_PATH}/Products/Applications/${SCHEME}.app"
          cp -R "${APP_PATH}" "${OUT_DIR}/Payload/"
          (cd "${OUT_DIR}" && /usr/bin/zip -r "${SCHEME}-unsigned.ipa" Payload)

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-unsigned
          path: build_artifacts/*.ipa
          if-no-files-found: error
